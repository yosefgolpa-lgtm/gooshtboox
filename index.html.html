<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>گوشت‌باکس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#1c1512;
    --charcoal-2:#241b17;
    --crate-red:#b3282d;
    --crate-red-dark:#8a1f23;
    --bone:#f3e8d3;
    --gold:#c99a3e;
    --smoke:#5a4f47;
    --ink:#2b2018;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, #2a201b 0%, var(--charcoal) 55%),
      var(--charcoal);
    font-family:'Vazirmatn',sans-serif;
    color:var(--bone);
    overflow-x:hidden;
  }
  body{
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    position:relative;
  }
  /* subtle butcher-paper grain */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 2px, rgba(255,255,255,0.015) 3px);
    pointer-events:none;
    mix-blend-mode:overlay;
  }
  .eyebrow{
    letter-spacing:0.35em;
    font-size:12px;
    color:var(--gold);
    font-weight:600;
    margin-bottom:14px;
    text-transform:uppercase;
  }
  h1{
    font-size:clamp(2.2rem,7vw,3.6rem);
    font-weight:900;
    margin:0 0 8px 0;
    letter-spacing:-0.01em;
    text-align:center;
    color:var(--bone);
  }
  h1 span{color:var(--crate-red);}
  .sub{
    color:var(--smoke);
    font-size:clamp(0.95rem,2.2vw,1.1rem);
    text-align:center;
    max-width:420px;
    margin:0 0 56px 0;
    line-height:1.9;
  }
  .stage{
    position:relative;
    width:min(70vw,260px);
    height:min(70vw,260px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  /* the crate */
  .crate{
    position:relative;
    width:70%;
    height:70%;
    cursor:pointer;
    transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.55));
  }
  .crate:hover{ transform:translateY(-4px) rotate(-1.5deg); }
  .crate:active{ transform:translateY(0) scale(0.97); }
  .crate.locked{ pointer-events:none; }

  .box-face{
    position:absolute; inset:0;
    background:
      linear-gradient(160deg, var(--crate-red) 0%, var(--crate-red-dark) 100%);
    border-radius:10px;
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.25), inset 0 12px 20px rgba(255,255,255,0.08);
  }
  .box-face::before{
    content:"";
    position:absolute; left:0; right:0; top:46%; height:8%;
    background:rgba(0,0,0,0.18);
  }
  .box-face::after{
    content:"";
    position:absolute; top:0; bottom:0; left:46%; width:8%;
    background:rgba(0,0,0,0.18);
  }
  .stamp{
    position:absolute;
    top:14%; left:50%;
    transform:translateX(-50%) rotate(-8deg);
    border:2px solid var(--bone);
    color:var(--bone);
    padding:4px 10px;
    font-size:11px;
    font-weight:800;
    letter-spacing:0.15em;
    border-radius:4px;
    opacity:0.85;
    white-space:nowrap;
  }
  .tag{
    position:absolute;
    bottom:-46px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    pointer-events:none;
  }
  .tag .string{
    width:2px;height:20px;
    background:var(--smoke);
  }
  .tag .label{
    margin-top:-2px;
    background:var(--gold);
    color:var(--ink);
    font-weight:800;
    font-size:13px;
    padding:6px 14px;
    border-radius:3px;
    box-shadow:0 6px 14px rgba(0,0,0,0.35);
    transform:rotate(2deg);
  }

  .crate.shake{ animation:shake 0.5s ease-in-out infinite; }
  @keyframes shake{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-3deg); }
    75%{ transform:rotate(3deg); }
  }

  .crate.explode{ animation:pop 0.28s ease-out forwards; }
  @keyframes pop{
    0%{ transform:scale(1); opacity:1; }
    60%{ transform:scale(1.18); opacity:1; }
    100%{ transform:scale(0.2); opacity:0; }
  }

  .shard{
    position:absolute;
    top:50%; left:50%;
    width:14px; height:14px;
    background:var(--crate-red);
    border-radius:3px;
    opacity:0;
    pointer-events:none;
  }
  .shard.fly{
    animation:fly 0.85s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes fly{
    0%{ opacity:1; transform:translate(-50%,-50%) rotate(0deg) scale(1); }
    100%{ opacity:0; transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0.4); }
  }

  .reveal{
    position:relative;
    max-width:420px;
    width:min(88vw,420px);
    background:var(--bone);
    color:var(--ink);
    border-radius:6px;
    padding:38px 30px 32px;
    text-align:center;
    box-shadow:0 24px 50px rgba(0,0,0,0.5);
    transform:scale(0.85) rotate(-1deg);
    opacity:0;
    transition:transform 0.5s cubic-bezier(.34,1.56,.64,1), opacity 0.4s ease;
  }
  .reveal.show{
    opacity:1;
    transform:scale(1) rotate(-1deg);
  }
  .reveal::before{
    content:"";
    position:absolute; inset:8px;
    border:1.5px dashed rgba(43,32,24,0.25);
    border-radius:3px;
    pointer-events:none;
  }
  .reveal .mark{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--crate-red);
    font-weight:800;
    margin-bottom:16px;
    text-transform:uppercase;
  }
  .reveal .msg{
    font-size:clamp(1.15rem,3.4vw,1.4rem);
    font-weight:700;
    line-height:1.85;
  }
  .again{
    margin-top:26px;
    background:var(--crate-red);
    color:var(--bone);
    border:none;
    font-family:inherit;
    font-weight:800;
    font-size:14px;
    padding:12px 26px;
    border-radius:5px;
    cursor:pointer;
    letter-spacing:0.03em;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  .again:hover{ background:var(--crate-red-dark); transform:translateY(-2px); }
  .again:active{ transform:translateY(0); }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    .crate, .crate.shake, .crate.explode, .shard.fly, .reveal{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

  <div class="eyebrow">خوش آمدید به</div>
  <h1><span>گوشت</span>‌باکس</h1>
  <p class="sub">یک جعبه، یک شانس، یک پیام مخصوص شما.<br>روی جعبه بزن و ببین امشب چی در انتظارته.</p>

  <div class="stage" id="stage">
    <div class="crate" id="crate">
      <div class="box-face"></div>
      <div class="stamp">مهر و موم</div>
      <div class="tag">
        <div class="string"></div>
        <div class="label">بازش کن</div>
      </div>
    </div>
  </div>

  <div class="reveal" id="reveal">
    <div class="mark">پیام امروز شما</div>
    <div class="msg" id="msgText"></div>
  </div>

<script>
  const messages = [
    "امشب بوی زغال و کباب توی هواست، آماده باش!",
    "گوشت خوب صبر می‌خواد، درست مثل چیزهای خوب زندگی.",
    "صدای جلزوولز روی آتش، شیرین‌ترین آهنگ آشپزخونه‌ست.",
    "امروز روز شانس توئه؛ یه سفره‌ی پر راه بنداز.",
    "بهترین تیکه همیشه برای کسیه که صبر می‌کنه.",
    "یه کباب داغ می‌تونه بدترین روزها رو هم درست کنه.",
    "دستور امروز: کمتر عجله، بیشتر مزه.",
    "هر جعبه یه راز داره؛ این یکی رازش گرسنگیته!",
    "امشب دور هم جمع شید، بهونه‌اش با ما.",
    "طعم واقعی از صبر و آتش ملایم میاد، نه عجله."
  ];

  const crate = document.getElementById('crate');
  const stage = document.getElementById('stage');
  const reveal = document.getElementById('reveal');
  const msgText = document.getElementById('msgText');
  const againBtn = document.getElementById('againBtn');

  function pickMessage(){
    return messages[Math.floor(Math.random() * messages.length)];
  }

  function spawnShards(){
    for(let i=0;i<14;i++){
      const s = document.createElement('div');
      s.className = 'shard';
      const angle = Math.random() * Math.PI * 2;
      const dist = 90 + Math.random() * 90;
      const tx = Math.cos(angle) * dist + 'px';
      const ty = Math.sin(angle) * dist + 'px';
      const rot = (Math.random() * 720 - 360) + 'deg';
      s.style.setProperty('--tx', tx);
      s.style.setProperty('--ty', ty);
      s.style.setProperty('--rot', rot);
      const hue = Math.random() > 0.5 ? '#b3282d' : '#c99a3e';
      s.style.background = hue;
      stage.appendChild(s);
      requestAnimationFrame(()=> s.classList.add('fly'));
      setTimeout(()=> s.remove(), 900);
    }
  }

  function openBox(){
    if(crate.classList.contains('locked')) return;
    crate.classList.add('locked','shake');
    setTimeout(()=>{
      crate.classList.remove('shake');
      crate.classList.add('explode');
      spawnShards();
      setTimeout(()=>{
        stage.classList.add('hidden');
        msgText.textContent = pickMessage();
        reveal.classList.add('show');
      }, 260);
    }, 420);
  }

  function resetBox(){
    reveal.classList.remove('show');
    setTimeout(()=>{
      stage.classList.remove('hidden');
      crate.classList.remove('locked','explode');
    }, 300);
  }

  crate.addEventListener('click', openBox);
  againBtn.addEventListener('click', resetBox);
</script>
</body>
</html>
